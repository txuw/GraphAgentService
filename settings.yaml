app:
  name: OverMindAgent
  env: local
  host: 0.0.0.0
  port: 8000
  reload: false
  log_level: info

llm:
  default_profile: default
  aliases:
    general_chat: default
    multimodal: default
    structured_output: default
    tool_calling: default
  profiles:
    default:
      api_key: null
      provider: openai
      base_url: null
      model: gpt-4o-mini
      temperature: 0.0
      timeout: 60.0
      max_tokens: null
      provider_options: {}

graph:
  default_name: text-analysis
  debug: false
  enable_structured_output: true
  checkpoint_mode: memory

graphs:
  text-analysis:
    llm_bindings:
      analysis: structured_output
  tool-agent:
    llm_bindings:
      agent: tool_calling

observability:
  log_payloads: false

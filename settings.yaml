app:
  name: OverMindAgent
  env: local
  host: 0.0.0.0
  port: 8000
  reload: false
  log_level: info

llm:
  api_key: null
  provider: openai
  protocol: responses
  base_url: null
  model: gpt-4o-mini
  temperature: 0.0
  timeout: 60.0
  max_tokens: null
  stream_enabled: true
  parallel_tool_calls: true
  max_tool_rounds: 8
  provider_options: {}

graph:
  default_name: text-analysis
  debug: false
  enable_structured_output: true
  checkpoint_mode: memory

observability:
  log_payloads: false

app:
  name: GraphAgentService
  env: local
  host: 0.0.0.0
  port: 8000
  reload: false
  # Logging level for the application and uvicorn loggers.
  # Valid values: debug | info | warning | error | critical
  log_level: info

llm:
  default_profile: default
  aliases:
    general_chat: default
    multimodal: mult_model
    planning: default
    structured_output: default
    tool_calling: default
  profiles:
    default:
      api_key: null
      provider: openai
      base_url: null
      model: gpt-4o-mini
      temperature: 0.0
      timeout: 60.0
      max_tokens: null
      provider_options: {}
    mult_model:
      api_key: null
      provider: openai
      base_url: null
      model: gemini-3.1-pro
      temperature: 0.0
      timeout: 90.0
      max_tokens: null
      provider_options: { }

graph:
  default_name: text-analysis
  debug: false
  enable_structured_output: true
  checkpoint_mode: memory
  checkpoint:
    postgres:
      url: null

tools:
  time:
    default_city: shanghai

logto:
  enabled: false
  issuer_uri:
  audience:
  jwk_set_uri:

mcp:
  enabled: true
  request_timeout: 30.0
  tool_cache_ttl_seconds: 300
  connections:
    sport:
      enabled: true
      transport: streamable_http
      url: "http://api.txuw.top/mcp-servers/sport-assistant-mcp"
      headers: {}
      server_description: "	sport-assistant-mcp"

graphs:
  text-analysis:
    llm_bindings:
      analysis: structured_output
  plan-analyze:
    llm_bindings:
      analysis: tool_calling
    mcp_servers: ["sport"]
  image-agent:
    llm_bindings:
      analysis: multimodal
  image-analyze-calories:
    llm_bindings:
      analysis: multimodal
  tool-agent:
    llm_bindings:
      agent: tool_calling
    mcp_servers: ["sport"]

observability:
  # When true, full request/response payloads are logged at DEBUG level.
  # Keep false in production to avoid logging sensitive user data.
  log_payloads: false

app:
  name: GraphAgentService
  env: local
  host: 0.0.0.0
  port: 8000
  reload: false
  log_level: info

llm:
  default_profile: default
  aliases:
    general_chat: default
    multimodal: mult_model
    planning: default
    structured_output: default
    tool_calling: default
  profiles:
    default:
      api_key: null
      provider: openai
      base_url: null
      model: gpt-4o-mini
      temperature: 0.0
      timeout: 180.0
      max_tokens: null
      provider_options: {}
    mult_model:
      api_key: null
      provider: openai
      base_url: null
      model: gpt-4o-mini
      temperature: 0.1
      timeout: 180.0
      max_tokens: null
      provider_options: {}

graph:
  default_name: text-analysis
  debug: false
  enable_structured_output: true
  checkpoint_mode: memory
  checkpoint:
    postgres:
      url: null

tools:
  time:
    default_city: shanghai

logto:
  enabled: false
  issuer_uri: null
  audience: null
  jwk_set_uri: null

mcp:
  enabled: true
  request_timeout: 30.0
  tool_cache_ttl_seconds: 300
  connections:
    sport:
      enabled: true
      transport: streamable_http
      url: null
      headers: {}
      server_description: "sport-assistant-mcp"

graphs:
  text-analysis:
    llm_bindings:
      analysis: structured_output
  plan-analyze:
    llm_bindings:
      analysis: tool_calling
    mcp_servers: ["sport"]
  image-agent:
    llm_bindings:
      analysis: multimodal
  image-analyze-calories:
    llm_bindings:
      analysis: multimodal
  tool-agent:
    llm_bindings:
      agent: tool_calling
    mcp_servers: ["sport"]

# 全局记忆服务配置（Mem0）
memory:
  enabled: false
  llm:
    provider: openai
    model: gpt-4.1-nano-2025-04-14
    temperature: 0.1
    max_tokens: 1500
  embedder:
    provider: openai
    model: text-embedding-3-small
  vector_store:
    provider: milvus
    collection_name: mem0
    embedding_model_dims: 1536
    url: null
    token: null
    metric_type: L2
    db_name: default
  recall:
    max_results: 5
    min_score: 0.3
  commit:
    queue_maxsize: 256
    worker_count: 2

observability:
  log_payloads: false
  logging:
    format: text_kv
    access_log: true
    node_events: true

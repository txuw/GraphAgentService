apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: overmindagent

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: overmindagent-config
    envs:
      - .env

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: overmindagent
    newName: registry.example.com/namespace/overmindagent
    newTag: latest
